name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
      - "**/*.md"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Everything-To-IMU-SlimeVR.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build Everything-To-IMU-SlimeVR.sln -c Release --no-restore /warnaserror

      - name: Test
        run: |
          if (Test-Path SlimeImuProtocol/SlimeImuProtocol.Tests/SlimeImuProtocol.Tests.csproj) {
            dotnet test SlimeImuProtocol/SlimeImuProtocol.Tests/SlimeImuProtocol.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"
          } else {
            Write-Host "No test project found yet — skipping."
          }
