version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      wpf-ui:
        patterns:
          - "WPF-UI"
          - "Wpf.Ui*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - ci
